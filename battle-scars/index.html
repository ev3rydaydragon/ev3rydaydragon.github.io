<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  
  /* Scroll height to drive the board pawn movement */
  body {
    background: #020306;
    height: 500vh; /* Smooth scroll track depth */
    overflow-x: hidden;
  }

  /* ---- Fullscreen Candy Land Board Viewport ---- */
  .board-viewport {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: 
      radial-gradient(130% 110% at 50% 50%, #0c0e25 0%, #030409 65%, #000 100%);
  }
  .board-viewport svg {
    width: 100%;
    height: 100%;
    max-width: 95vh;  /* Keep it square and fully visible vertically */
    max-height: 95vw; /* Keep it square and fully visible horizontally */
    object-fit: contain;
    overflow: visible;
  }

  /* Winding Ribbon Path base */
  .board-road {
    stroke: rgba(255, 255, 255, 0.02);
    stroke-width: 60;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }
  .board-road-center {
    stroke: rgba(255, 255, 255, 0.06);
    stroke-width: 2;
    stroke-dasharray: 6 8;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  /* Candy Land Squares Styling */
  .interactive-tile-group {
    cursor: pointer;
  }
  .interactive-tile-group rect {
    transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), stroke-width 0.25s ease;
    transform-box: fill-box;
    transform-origin: center;
  }
  .interactive-tile-group:hover rect, .interactive-tile-group.active rect {
    transform: scale(1.15);
    stroke: #fff;
    stroke-width: 2.5px;
  }

  .stop-num {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 14px;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }

  .tile-label-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 10px;
    fill: #fff;
    letter-spacing: 0.08em;
    pointer-events: none;
  }

  /* Spinner Styling */
  .board-spinner {
    pointer-events: auto;
  }
  #spinner-group {
    transform-box: fill-box;
    transform-origin: center;
    animation: spinner-pulse 3s infinite ease-in-out;
  }
  #spinner-wheel {
    transform-origin: center;
    cursor: pointer;
  }
  @keyframes spinner-pulse {
    0%, 100% { filter: drop-shadow(0 4px 15px rgba(255, 226, 89, 0.2)); }
    50% { filter: drop-shadow(0 4px 25px rgba(255, 226, 89, 0.6)); }
  }

  /* Whimsical Decorative Elements */
  .candy-forest-cane {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Spin Result Toast */
  .spin-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translate(-50%, 100px) scale(0.9);
    background: rgba(9, 11, 23, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 16px;
    padding: 12px 24px;
    z-index: 10000;
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 226, 89, 0.25);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
    text-align: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    pointer-events: none;
  }
  .spin-toast.visible {
    transform: translate(-50%, 0) scale(1);
    opacity: 1;
  }
  .toast-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #ffa751;
    margin-bottom: 4px;
  }
  .toast-num {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 28px;
    line-height: 1;
    color: #fff;
  }

  @media (prefers-reduced-motion: reduce) {
    #spinner-wheel { transition: none !important; }
    #spinner-group { animation: none !important; }
  }
</style>
</head>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const boardPath = document.getElementById('board-path');
    const tokenInstance = document.getElementById('token-instance');
    const boardSvg = document.getElementById('board-svg');
    const tilesGroup = document.getElementById('tiles-group');

    // Total Candy Land bricks (continuous adjacent squares)
    const totalTiles = 60;
    const stopIndices = [0, 7, 14, 21, 28, 35, 42, 49, 59];
    const stopLabelsText = [
      "START", "SAN DIEGO", "PHILLY", "NEW YORK", "HOUSTON", 
      "SEATTLE", "ST LOUIS", "CHICAGO", "PHILLY AGAIN"
    ];

    const tilePositions = [];
    const pathLength = boardPath.getTotalLength();

    // 1. DYNAMICALLY GENERATE CONNECTED CHAIN OF SQUARES (CANDY LAND PALETTE)
    const colors = [
      'url(#candy-red)', 
      'url(#candy-orange)', 
      'url(#candy-yellow)', 
      'url(#candy-green)', 
      'url(#candy-blue)', 
      'url(#candy-purple)'
    ];
    
    for (let i = 0; i < totalTiles; i++) {
      const distance = (i / (totalTiles - 1)) * pathLength;
      const point = boardPath.getPointAtLength(distance);
      
      // Calculate tangent angle to align squares along winding curves
      const point2 = boardPath.getPointAtLength(Math.min(pathLength, distance + 2.0));
      const angle = Math.atan2(point2.y - point.y, point2.x - point.x) * 180 / Math.PI;

      tilePositions.push({ x: point.x, y: point.y, angle: angle });

      // Create group container for the square tile
      const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      group.setAttribute('transform', `translate(${point.x}, ${point.y}) rotate(${angle})`);

      let isStop = stopIndices.includes(i);
      // Large stops, medium bricks
      let side = isStop ? 60 : 54;
      let half = side / 2;

      if (isStop) {
        group.setAttribute('class', 'interactive-tile-group');
        const stopIndex = stopIndices.indexOf(i);
        // Direct click scrolls to corresponding depth
        group.addEventListener('click', () => {
          const targetScrollY = (stopIndex / (stopIndices.length - 1)) * (document.documentElement.scrollHeight - window.innerHeight);
          window.scrollTo({
            top: targetScrollY,
            behavior: 'smooth'
          });
        });
      }

      // Tile Shadow Rect
      const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      shadow.setAttribute('x', -half);
      shadow.setAttribute('y', -half);
      shadow.setAttribute('width', side);
      shadow.setAttribute('height', side);
      shadow.setAttribute('rx', 6);
      shadow.setAttribute('fill', 'none');
      shadow.setAttribute('filter', 'url(#tile-shadow)');
      group.appendChild(shadow);

      // Tile Main Rect
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', -half);
      rect.setAttribute('y', -half);
      rect.setAttribute('width', side);
      rect.setAttribute('height', side);
      rect.setAttribute('rx', 6);
      
      let fillVal = colors[i % colors.length];
      if (i === 0) fillVal = 'url(#candy-lavender)'; // Start tile
      rect.setAttribute('fill', fillVal);
      if (isStop) {
        rect.setAttribute('stroke', '#fff');
        rect.setAttribute('stroke-width', '3');
      }
      group.appendChild(rect);

      // Gloss Overlay
      const gloss = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      gloss.setAttribute('x', -half);
      gloss.setAttribute('y', -half);
      gloss.setAttribute('width', side);
      gloss.setAttribute('height', side);
      gloss.setAttribute('rx', 6);
      gloss.setAttribute('fill', 'url(#tile-gloss)');
      group.appendChild(gloss);

      // Label details inside stop tiles
      if (isStop) {
        const stopIndex = stopIndices.indexOf(i);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', 0);
        text.setAttribute('y', 0);
        text.setAttribute('transform', `rotate(${-angle})`); // Keep numbers upright
        text.setAttribute('class', 'stop-num');
        text.setAttribute('fill', (i === 0 || stopIndex === 8) ? '#000' : '#fff');
        text.textContent = stopIndex === 0 ? "S" : stopIndex;
        group.appendChild(text);

        // Counter-rotated text label for city names
        const labelWidth = stopLabelsText[stopIndex].length * 7 + 16;
        
        const labelGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        labelGroup.setAttribute('transform', `rotate(${-angle}) translate(0, -56)`);

        const labelRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        labelRect.setAttribute('x', -labelWidth / 2);
        labelRect.setAttribute('y', -9);
        labelRect.setAttribute('width', labelWidth);
        labelRect.setAttribute('height', 18);
        labelRect.setAttribute('rx', 9);
        labelRect.setAttribute('fill', 'rgba(6, 8, 20, 0.88)');
        labelRect.setAttribute('stroke', 'rgba(255, 255, 255, 0.16)');
        labelRect.setAttribute('stroke-width', '1');
        labelGroup.appendChild(labelRect);

        const labelText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        labelText.setAttribute('x', 0);
        labelText.setAttribute('y', 0);
        labelText.setAttribute('class', 'tile-label-text');
        labelText.setAttribute('text-anchor', 'middle');
        labelText.textContent = stopLabelsText[stopIndex];
        labelGroup.appendChild(labelText);

        group.appendChild(labelGroup);
      }

      tilesGroup.appendChild(group);
    }

    // 2. SCROLL ANIMATION SYSTEM
    let targetScrollIndex = 0;
    let currentScrollIndex = 0;

    let lastX = 150;
    let lastFlipX = 1;

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const lerpFactor = prefersReducedMotion ? 1.0 : 0.08;

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const scrollMax = document.documentElement.scrollHeight - window.innerHeight;
      const pct = scrollMax > 0 ? scrollY / scrollMax : 0;
      targetScrollIndex = pct * (totalTiles - 1);
    });

    // Main animation ticking
    function tick() {
      currentScrollIndex += (targetScrollIndex - currentScrollIndex) * lerpFactor;

      if (Math.abs(targetScrollIndex - currentScrollIndex) < 0.0005) {
        currentScrollIndex = targetScrollIndex;
      }

      const indexFloor = Math.floor(currentScrollIndex);
      const indexCeil = Math.min(totalTiles - 1, indexFloor + 1);
      const f = currentScrollIndex - indexFloor;

      // Monopoly style hop transition curves
      let t_eased = 0;
      if (f > 0.15 && f < 0.85) {
        let t = (f - 0.15) / 0.7;
        t_eased = t * t * (3 - 2 * t);
      } else if (f >= 0.85) {
        t_eased = 1.0;
      }

      const distFloor = (indexFloor / (totalTiles - 1)) * pathLength;
      const distCeil = (indexCeil / (totalTiles - 1)) * pathLength;
      const targetDistance = distFloor + (distCeil - distFloor) * t_eased;

      const point = boardPath.getPointAtLength(targetDistance);

      // Parabolic Hop height & squash stretch scaling
      const maxJumpHeight = 60;
      const jumpY = -maxJumpHeight * 4 * t_eased * (1 - t_eased);

      const midAirFactor = Math.sin(t_eased * Math.PI);
      const stretchY = 1.0 + 0.20 * midAirFactor;
      const squashX = 1.0 - 0.08 * midAirFactor;

      // Token facing flip
      let flipX = lastFlipX;
      const deltaX = point.x - lastX;
      if (Math.abs(deltaX) > 0.3) {
        flipX = deltaX > 0 ? 1 : -1;
      }
      lastX = point.x;
      lastFlipX = flipX;

      // Transform Pawn (Translate, scale jump squashes)
      tokenInstance.setAttribute('transform', `translate(${point.x}, ${point.y + jumpY}) scale(${flipX * squashX}, ${stretchY})`);

      // 3. STATIC FULL-MAP SCALING
      // The board viewport CSS handles responsive aspect-ratio containment statically.
      // We set a fixed viewBox="0 0 1000 1000" to keep the entire map visible.
      boardSvg.setAttribute('viewBox', '0 0 1000 1000');

      // Sync active state in tile classes
      const roundedIndex = Math.round(currentScrollIndex);
      const allTileGroups = tilesGroup.querySelectorAll('.interactive-tile-group');
      allTileGroups.forEach((tg, idx) => {
        const stopTile = stopIndices[idx];
        if (stopTile === roundedIndex) {
          tg.classList.add('active');
        } else {
          tg.classList.remove('active');
        }
      });

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);

    // ---- Game of Life Spinner Click Action ----
    const spinnerWheel = document.getElementById('spinner-wheel');
    let spinnerRotation = 0;
    let isSpinning = false;

    spinnerWheel.addEventListener('click', () => {
      if (isSpinning) return;
      isSpinning = true;

      const spinAngle = 1080 + Math.random() * 720;
      spinnerRotation += spinAngle;
      spinnerWheel.style.transform = `rotate(${spinnerRotation}deg)`;

      // Spin end triggers alert
      setTimeout(() => {
        isSpinning = false;
        const landingDegrees = (360 - (spinnerRotation % 360)) % 360;
        const segmentIndex = Math.floor(landingDegrees / 36);
        const rolledNumber = (segmentIndex % 10) + 1;
        showToastAlert(rolledNumber);
      }, 3500);
    });

    function showToastAlert(num) {
      const existing = document.querySelector('.spin-toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.className = 'spin-toast';
      toast.innerHTML = `
        <div class="toast-title">🎡 Spinner Result</div>
        <div class="toast-num"></div>
      `;
      toast.querySelector('.toast-num').textContent = num;
      document.body.appendChild(toast);
      
      setTimeout(() => toast.classList.add('visible'), 50);

      setTimeout(() => {
        toast.classList.remove('visible');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }
  });
</script>
</body>
</html>
