<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dragon Chan — Ready to Fly?</title>
<meta name="description" content="Every city Dragon Chan has lived in, laid out as a board game. Scroll to hop the dragon pawn through the journey.">

<link rel="canonical" href="https://iamdragonc.com/battle-scars/">
<meta property="og:title" content="Dragon Chan — Ready to Fly?">
<meta property="og:description" content="Eight cities, one dragon pawn, board not finished. Scroll to play.">
<meta property="og:url" content="https://iamdragonc.com/battle-scars/">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  /* EverydayDragon brand: Mythical Midnight, Bodacious Blurple, Poised
     Periwinkle, Witty Wisteria, Meaningful Moss, Brave Battleship,
     Crafty Crimson, Stoic Snow. Hard offset shadows, crisp radii. */
  :root {
    --ed-midnight: #000000;
    --ed-snow: #FFFFFF;
    --ed-blurple: #3066BE;
    --ed-periwinkle: #090C9B;
    --ed-wisteria: #CCC9DC;
    --ed-moss: #6E9075;
    --ed-battleship: #7C7C7C;
    --ed-crimson: #D7263D;
    --font-display: 'Montserrat', 'Gotham', system-ui, sans-serif;
    --font-body: 'Mulish', 'Avenir', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  html { scroll-snap-type: y proximity; }

  body { background: var(--ed-midnight); overflow-x: hidden; }

  /* ---- Fixed board layer ---- */
  .board-viewport {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: radial-gradient(120% 100% at 50% 40%, #0a0f2e 0%, #04050f 55%, #000 100%);
  }
  .board-viewport svg { width: 100%; height: 100%; overflow: visible; }

  /* Road ribbon */
  .road-under {
    stroke: rgba(204, 201, 220, 0.07);
    stroke-width: 76;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }
  .board-road {
    stroke: rgba(204, 201, 220, 0.05);
    stroke-width: 62;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }
  .board-road-center {
    stroke: rgba(204, 201, 220, 0.28);
    stroke-width: 2;
    stroke-dasharray: 6 9;
    stroke-linecap: round;
    fill: none;
  }
  /* Traveled track: crimson-on-snow ribbon the pawn re-crosses at Philly */
  .trail-casing {
    stroke: var(--ed-snow);
    stroke-width: 11;
    stroke-linecap: round;
    fill: none;
    opacity: 0.9;
  }
  .trail-core {
    stroke: var(--ed-crimson);
    stroke-width: 5;
    stroke-linecap: round;
    fill: none;
  }

  .interactive-tile-group { cursor: pointer; }
  .interactive-tile-group .tile-face {
    transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), stroke 0.2s ease;
    transform-box: fill-box;
    transform-origin: center;
  }
  .interactive-tile-group:hover .tile-face, .interactive-tile-group.active .tile-face {
    transform: scale(1.12);
    stroke: var(--ed-crimson);
  }

  .tile-icon {
    font-size: 22px;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }
  .tile-label-text {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 11px;
    fill: var(--ed-midnight);
    letter-spacing: 0.08em;
    pointer-events: none;
  }
  /* Hide the label while the pawn is parked on the stop — the card names
     the city, and the pill would collide with the pawn */
  .tile-label { transition: opacity 0.3s ease; }
  .interactive-tile-group.active .tile-label { opacity: 0; }

  .candy-cane { fill: none; stroke-linecap: round; stroke-linejoin: round; }

  .mist-cloud { animation: cloud-drift 11s ease-in-out infinite alternate; transform-box: fill-box; }
  @keyframes cloud-drift {
    from { transform: translateX(-10px); }
    to { transform: translateX(10px); }
  }

  /* ---- Scroll track ---- */
  .scroll-track { position: relative; z-index: 2; pointer-events: none; }
  .beat { height: 100vh; scroll-snap-align: start; }

  /* ---- Title overlay ---- */
  .title-overlay {
    position: fixed;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 7vh;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .title-overlay.hidden { opacity: 0; }
  .title-overlay h1 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(36px, 7vw, 74px);
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--ed-snow);
    margin: 0;
    text-shadow: 5px 5px 0 var(--ed-blurple);
  }
  .title-overlay p {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: clamp(14px, 2.1vw, 18px);
    color: var(--ed-wisteria);
    margin: 12px 0 26px;
  }
  .scroll-hint {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.16em;
    color: var(--ed-crimson);
    animation: hint-bob 1.6s infinite ease-in-out;
  }
  @keyframes hint-bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }

  /* ---- Scar Card ---- */
  .card-overlay {
    position: fixed;
    inset: 0;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    perspective: 900px;
  }
  .scar-card {
    width: min(88vw, 400px);
    background: var(--ed-snow);
    border: 2px solid var(--ed-midnight);
    border-radius: 10px;
    box-shadow: 8px 8px 0 0 var(--ed-blurple);
    overflow: hidden;
    transform: rotateX(70deg) translateY(50px) rotate(-1.5deg);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
  }
  .card-overlay.visible .scar-card {
    transform: rotateX(0deg) translateY(0) rotate(-1.5deg);
    opacity: 1;
  }
  .scar-card .card-band {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    text-align: center;
    padding: 12px;
    border-bottom: 2px solid var(--ed-midnight);
  }
  .scar-card .card-body { padding: 26px 28px 24px; text-align: center; }
  .scar-card .card-icon { font-size: 44px; line-height: 1; }
  .scar-card .card-city {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 24px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: var(--ed-midnight);
    margin: 12px 0 10px;
  }
  .scar-card .card-line {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 15px;
    line-height: 1.5;
    color: #3d3d3d;
    margin: 0;
  }
  .scar-card .card-foot {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--ed-battleship);
    text-align: center;
    padding: 0 0 18px;
  }

  /* ---- Outro overlay ---- */
  .outro-overlay {
    position: fixed;
    inset: 0;
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  .outro-overlay.visible { opacity: 1; }
  .outro-overlay h2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(30px, 6vw, 60px);
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--ed-snow);
    margin: 0 0 14px;
    text-shadow: 5px 5px 0 var(--ed-crimson);
  }
  .outro-overlay p {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: clamp(14px, 2.2vw, 18px);
    color: var(--ed-wisteria);
    max-width: 460px;
    margin: 0 0 30px;
  }
  .outro-overlay a {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.14em;
    color: var(--ed-midnight);
    text-decoration: none;
    background: var(--ed-snow);
    border: 2px solid var(--ed-midnight);
    border-radius: 6px;
    padding: 13px 28px;
    box-shadow: 5px 5px 0 0 var(--ed-crimson);
    pointer-events: auto;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .outro-overlay a:hover {
    transform: translate(2px, 2px);
    box-shadow: 3px 3px 0 0 var(--ed-crimson);
  }

  @media (prefers-reduced-motion: reduce) {
    .scar-card { transition: opacity 0.2s ease; transform: rotate(-1.5deg); }
    .card-overlay.visible .scar-card { transform: rotate(-1.5deg); }
    .scroll-hint { animation: none; }
    .mist-cloud { animation: none; }
  }
</style>
</head>
<body>

<div class="board-viewport">

      <!-- TO BE CONTINUED sign in the fog -->
      <g id="fog-sign" transform="translate(720, 850) rotate(7)" opacity="0.8">
        <line x1="0" y1="0" x2="0" y2="42" stroke="#7C7C7C" stroke-width="4" />
        <rect x="-82" y="-27" width="164" height="32" rx="6" fill="rgba(255,255,255,0.95)" stroke="#7C7C7C" stroke-width="2" stroke-dasharray="6 4" />
        <text x="0" y="-11" font-family="Montserrat, sans-serif" font-weight="900" font-size="12" letter-spacing="0.1em" fill="#3d3d3d" text-anchor="middle" dominant-baseline="central">TO BE CONTINUED…</text>
      </g>

      <g id="sprinkles"></g>
    </g>

    <!-- Track: crosses itself at Philly (first pass arrives at 45° up-right,
         return arrives flat east and exits down-right into the fog), with a
         full loop-de-loop on the Houston→Seattle stretch, three hairpins
         down the left side, S-bends and hooks throughout. The fog trail
         wanders off down the right and dies in an open curl — it does NOT
         loop back to START (the journey has no fixed ending). -->
    <path class="road-under" id="road-under" d="" />
    <path class="board-road" id="board-road" d="" />
    <path class="trail-casing" id="trail-casing" d="" />
    <path class="trail-core" id="trail-core" d="" />
    <path class="board-road-center" id="board-path" d="M 110,915
      C 150,955 205,935 240,900
      C 275,865 240,835 270,805
      C 295,782 330,820 330,860
      C 430,830 540,790 560,720
      C 575,655 505,625 520,565
      C 528,528 540,505 560,480
      C 620,420 640,390 690,395
      C 740,400 750,350 800,355
      C 850,360 850,325 860,300
      C 905,255 895,205 845,185
      C 805,170 802,208 762,202
      C 722,196 730,168 695,163
      C 660,158 620,150 590,140
      C 550,150 520,170 480,180
      C 420,192 345,185 340,120
      C 336,50 445,45 462,115
      C 470,155 430,175 385,165
      C 330,152 268,105 230,120
      C 160,140 110,170 130,220
      C 150,265 215,255 235,295
      C 252,328 195,345 158,352
      C 118,360 140,395 122,415
      C 108,432 100,440 100,450
      C 112,500 80,545 125,585
      C 165,620 105,640 145,665
      C 185,690 260,655 310,690
      C 360,720 420,700 440,640
      C 455,595 400,520 435,495
      C 465,473 520,480 560,480
      C 620,480 610,540 660,555
      C 710,570 700,600 745,610
      C 770,615 780,615 790,620
      C 835,655 875,700 872,755
      C 869,815 795,835 755,795
      C 723,763 748,713 795,720" />

    <g id="tiles-group"></g>

    <g id="mist"></g>

    <ellipse id="pawn-shadow" cx="110" cy="921" rx="20" ry="7" fill="rgba(0,0,0,0.5)" />
    <g id="token-instance" transform="translate(110,915)">
      <use href="#dragon-pawn" />
    </g>

    </g><!-- /camera -->
  </svg>
</div>

<main class="scroll-track" id="scroll-track"></main>

<div class="title-overlay" id="title-overlay">
  <h1>Ready to Fly?</h1>
  <div class="scroll-hint">SCROLL TO ROLL ▼</div>
</div>

<div class="card-overlay" id="card-overlay">
  <div class="scar-card" id="scar-card">
    <div class="card-band" id="card-band">★ SCAR CARD ★</div>
    <div class="card-body">
      <div class="card-icon" id="card-icon"></div>
      <div class="card-city" id="card-city"></div>
      <p class="card-line" id="card-line"></p>
    </div>
    <div class="card-foot">SCROLL TO KEEP ROLLING ▼</div>
  </div>
</div>

<div class="outro-overlay" id="outro-overlay">
  <h2>That's It For Now.</h2>
  <p>The dragon is still mid-game. New tiles get built as life happens. Check back to see where it lands next.</p>
  <a href="/">← BACK TO HOME BASE</a>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
    window.scrollTo(0, 0);

    const boardPath = document.getElementById('board-path');
    const tokenInstance = document.getElementById('token-instance');
    const pawnShadow = document.getElementById('pawn-shadow');
    const tilesGroup = document.getElementById('tiles-group');
    const camera = document.getElementById('camera');
    const scrollTrack = document.getElementById('scroll-track');
    const titleOverlay = document.getElementById('title-overlay');
    const cardOverlay = document.getElementById('card-overlay');
    const outroOverlay = document.getElementById('outro-overlay');
    const trailCasing = document.getElementById('trail-casing');
    const trailCore = document.getElementById('trail-core');

    const pathD = boardPath.getAttribute('d');
    for (const id of ['road-under', 'board-road', 'trail-casing', 'trail-core']) {
      document.getElementById(id).setAttribute('d', pathD);
    }
    const pathLength = boardPath.getTotalLength();
    for (const el of [trailCasing, trailCore]) {
      el.setAttribute('stroke-dasharray', String(pathLength));
      el.setAttribute('stroke-dashoffset', String(pathLength));
    }

    // ---- Stops. Anchors sit on path segment endpoints; the path crosses
    // itself at Philly (560,480). ----
    const STOPS = [
      { label: 'START',        anchor: [110, 915], icon: '🐉', labelBelow: true },
      { label: 'SAN DIEGO',    anchor: [330, 860], icon: '🌊', accent: '#3066BE', accentText: '#fff',
        line: 'Perfect weather again. Nobody trusts it. Take a beach day, no argument.' },
      { label: 'PHILLY',       anchor: [560, 480], icon: '🍺', accent: '#D7263D', accentText: '#fff',
        line: 'The brewery made too much beer. Throw a partaaayyy.' },
      { label: 'NEW YORK',     anchor: [860, 300], icon: '🚕', accent: '#090C9B', accentText: '#fff',
        line: 'Rent went up $400 overnight for no reason anyone can explain. Pay the toll, keep moving.' },
      { label: 'HOUSTON',      anchor: [590, 140], icon: '🌮', accent: '#6E9075', accentText: '#fff',
        line: 'Queso emergency declared citywide. Advance to the nearest taco truck.' },
      { label: 'SEATTLE',      anchor: [230, 120], icon: '☕', accent: '#7C7C7C', accentText: '#fff',
        line: "It's been raining for 97 days. Nobody has mentioned it once. Collect a free coffee, no small talk required." },
      { label: 'ST LOUIS',     anchor: [100, 450], icon: '🥟', accent: '#CCC9DC', accentText: '#000',
        line: "Toasted ravioli night. Everyone's invited, nobody agrees it's actually a ravioli." },
      { label: 'CHICAGO',      anchor: [310, 690], icon: '🌬️', accent: '#FFFFFF', accentText: '#000',
        line: 'Wind advisory in effect. Hold onto your hat and your deep-dish opinions.' },
      { label: 'PHILLY, AGAIN', anchor: [560, 480], icon: '🔁', accent: '#D7263D', accentText: '#fff', labelBelow: true,
        line: "Back where you started, except the brewery's still going. Pull up a chair, you know this bar by now." },
      { label: 'NEXT?', anchor: [790, 620], icon: '❓', outro: true },
    ];

    // Walk forward per stop so the two Philly anchors resolve to their own
    // passes through the crossing.
    const stopDistances = [];
    let searchFrom = 0;
    const SAMPLE = 2;
    for (const stop of STOPS) {
      let minD = Infinity, minAt = searchFrom;
      for (let d = searchFrom; d <= pathLength; d += SAMPLE) {
        const p = boardPath.getPointAtLength(d);
        const dist = Math.hypot(p.x - stop.anchor[0], p.y - stop.anchor[1]);
        if (dist < minD) { minD = dist; minAt = d; }
        if (minD < 40 && dist > minD + 120) break;
      }
      stopDistances.push(minAt);
      searchFrom = minAt + 60;
    }

    const TILE_SPACING = 54;
    const tileDistances = [stopDistances[0]];
    const stopTileIndex = [0];
    for (let k = 1; k < stopDistances.length; k++) {
      const a = stopDistances[k - 1], b = stopDistances[k];
      const n = Math.max(2, Math.round((b - a) / TILE_SPACING));
      for (let j = 1; j <= n; j++) tileDistances.push(a + ((b - a) * j) / n);
      stopTileIndex.push(tileDistances.length - 1);
    }
    const lastStopD = stopDistances[stopDistances.length - 1];
    const fogSpan = pathLength - lastStopD - 20;
    const fogN = Math.max(2, Math.round(fogSpan / TILE_SPACING));
    for (let j = 1; j <= fogN; j++) tileDistances.push(lastStopD + (fogSpan * j) / fogN);

    const totalTiles = tileDistances.length;
    const lastStopTile = stopTileIndex[stopTileIndex.length - 1];
    const fogStartTile = stopTileIndex[stopTileIndex.length - 2];

    // ---- Render tiles: flat brand fills, hard offset shadows (no blur
    // filters anywhere — this is both the brand's signature device and what
    // keeps the page fast) ----
    const TILE_COLORS = [
      { fill: '#D7263D', shadow: '#5a0f1a' },
      { fill: '#3066BE', shadow: '#122a52' },
      { fill: '#6E9075', shadow: '#2c3a2f' },
      { fill: '#CCC9DC', shadow: '#55536b' },
      { fill: '#FFFFFF', shadow: '#5c5c66' },
      { fill: '#090C9B', shadow: '#04053d' },
    ];
    const LAVENDER = { fill: '#CCC9DC', shadow: '#55536b' };
    const svgNS = 'http://www.w3.org/2000/svg';

    tileDistances.forEach((distance, i) => {
      const point = boardPath.getPointAtLength(distance);
      const point2 = boardPath.getPointAtLength(Math.min(pathLength, distance + 2));
      let angle = Math.atan2(point2.y - point.y, point2.x - point.x) * 180 / Math.PI;

      const stopIdx = stopTileIndex.indexOf(i);
      const isStop = stopIdx !== -1;
      const stop = isStop ? STOPS[stopIdx] : null;
      if (!isStop) angle += ((i * 2654435761) % 9) - 4;
      const side = isStop ? 62 : 54;
      const half = side / 2;
      const isFog = (i > fogStartTile && !isStop) || i > lastStopTile;

      const group = document.createElementNS(svgNS, 'g');
      group.setAttribute('transform', `translate(${point.x}, ${point.y}) rotate(${angle})`);

      const color = (i === 0 || (stop && stop.outro)) ? LAVENDER : TILE_COLORS[i % TILE_COLORS.length];

      if (!isFog) {
        // Hard offset shadow block — the brand's signature device
        const shadowRect = document.createElementNS(svgNS, 'rect');
        shadowRect.setAttribute('x', -half + 5); shadowRect.setAttribute('y', -half + 5);
        shadowRect.setAttribute('width', side); shadowRect.setAttribute('height', side);
        shadowRect.setAttribute('rx', 6);
        shadowRect.setAttribute('fill', color.shadow);
        group.appendChild(shadowRect);
      }

      const rect = document.createElementNS(svgNS, 'rect');
      rect.setAttribute('class', 'tile-face');
      rect.setAttribute('x', -half); rect.setAttribute('y', -half);
      rect.setAttribute('width', side); rect.setAttribute('height', side);
      rect.setAttribute('rx', 6);
      if (isFog) {
        rect.setAttribute('fill', '#101221');
        rect.setAttribute('stroke', '#7C7C7C');
        rect.setAttribute('stroke-width', '2');
        rect.setAttribute('stroke-dasharray', '5 5');
        group.setAttribute('opacity', '0.5');
      } else {
        rect.setAttribute('fill', color.fill);
        rect.setAttribute('stroke', isStop ? '#fff' : 'rgba(255,255,255,0.85)');
        rect.setAttribute('stroke-width', isStop ? '3.5' : '2');
      }
      group.appendChild(rect);

      if (isStop) {
        group.classList.add('interactive-tile-group');
        group.addEventListener('click', () => {
          const beat = document.getElementById(`beat-${stopIdx}`);
          if (beat) window.scrollTo({ top: beat.offsetTop, behavior: 'smooth' });
        });

        const icon = document.createElementNS(svgNS, 'text');
        icon.setAttribute('class', 'tile-icon');
        icon.setAttribute('transform', `rotate(${-angle})`);
        icon.textContent = stop.icon;
        group.appendChild(icon);

        const labelWidth = stop.label.length * 8 + 20;
        const labelY = stop.labelBelow ? 62 : -60;
        const labelGroup = document.createElementNS(svgNS, 'g');
        labelGroup.setAttribute('class', 'tile-label');
        labelGroup.setAttribute('transform', `rotate(${-angle}) translate(0, ${labelY})`);

        const labelShadow = document.createElementNS(svgNS, 'rect');
        labelShadow.setAttribute('x', -labelWidth / 2 + 3); labelShadow.setAttribute('y', -8);
        labelShadow.setAttribute('width', labelWidth); labelShadow.setAttribute('height', 22);
        labelShadow.setAttribute('rx', 4);
        labelShadow.setAttribute('fill', '#3066BE');
        labelGroup.appendChild(labelShadow);

        const labelRect = document.createElementNS(svgNS, 'rect');
        labelRect.setAttribute('x', -labelWidth / 2); labelRect.setAttribute('y', -11);
        labelRect.setAttribute('width', labelWidth); labelRect.setAttribute('height', 22);
        labelRect.setAttribute('rx', 4);
        labelRect.setAttribute('fill', '#fff');
        labelGroup.appendChild(labelRect);

        const labelText = document.createElementNS(svgNS, 'text');
        labelText.setAttribute('class', 'tile-label-text');
        labelText.setAttribute('text-anchor', 'middle');
        labelText.setAttribute('dominant-baseline', 'central');
        labelText.textContent = stop.label;
        labelGroup.appendChild(labelText);
        group.appendChild(labelGroup);
      }

      tilesGroup.appendChild(group);
    });

    // Star dust
    const starsGroup = document.getElementById('stars');
    for (let s = 0; s < 46; s++) {
      const c = document.createElementNS(svgNS, 'circle');
      c.setAttribute('cx', Math.random() * 1000);
      c.setAttribute('cy', Math.random() * 1000);
      c.setAttribute('r', 0.8 + Math.random() * 1.6);
      c.setAttribute('fill', '#fff');
      c.setAttribute('opacity', (0.12 + Math.random() * 0.25).toFixed(2));
      starsGroup.appendChild(c);
    }

    // Confetti sprinkles, brand colors
    const sprinkleColors = ['#D7263D', '#3066BE', '#6E9075', '#CCC9DC'];
    const sprinklesGroup = document.getElementById('sprinkles');
    for (let s = 0; s < 30; s++) {
      const r = document.createElementNS(svgNS, 'rect');
      const x = 40 + Math.random() * 920, y = 40 + Math.random() * 920;
      r.setAttribute('x', x); r.setAttribute('y', y);
      r.setAttribute('width', 9); r.setAttribute('height', 3.5);
      r.setAttribute('rx', 1.75);
      r.setAttribute('fill', sprinkleColors[s % sprinkleColors.length]);
      r.setAttribute('opacity', '0.4');
      r.setAttribute('transform', `rotate(${Math.random() * 180}, ${x}, ${y})`);
      sprinklesGroup.appendChild(r);
    }

    // Wisteria mist over the fogged half
    const mistGroup = document.getElementById('mist');
    [[865, 700, 70], [810, 805, 65], [745, 760, 50]].forEach(([cx, cy, rr]) => {
      const m = document.createElementNS(svgNS, 'g');
      m.setAttribute('class', 'mist-cloud');
      [[0, 0, rr], [-rr * 0.7, 8, rr * 0.6], [rr * 0.7, 10, rr * 0.55]].forEach(([ox, oy, orr]) => {
        const c = document.createElementNS(svgNS, 'ellipse');
        c.setAttribute('cx', cx + ox); c.setAttribute('cy', cy + oy);
        c.setAttribute('rx', orr); c.setAttribute('ry', orr * 0.45);
        c.setAttribute('fill', '#CCC9DC'); c.setAttribute('opacity', '0.16');
        m.appendChild(c);
      });
      mistGroup.appendChild(m);
    });

    // ---- Scroll beats + travel spacers ----
    const VH_PER_TILE = 18, TRAVEL_MIN = 100, TRAVEL_MAX = 240;
    STOPS.forEach((stop, k) => {
      if (k > 0) {
        const legTiles = stopTileIndex[k] - stopTileIndex[k - 1];
        const h = Math.max(TRAVEL_MIN, Math.min(TRAVEL_MAX, legTiles * VH_PER_TILE));
        const travel = document.createElement('div');
        travel.className = 'travel';
        travel.style.height = h + 'vh';
        scrollTrack.appendChild(travel);
      }
      const beat = document.createElement('section');
      beat.className = 'beat';
      beat.id = `beat-${k}`;
      scrollTrack.appendChild(beat);
    });

    let beatTops = [];
    function measure() {
      beatTops = STOPS.map((_, k) => document.getElementById(`beat-${k}`).offsetTop);
    }
    measure();
    window.addEventListener('resize', measure);

    function scrollToTileIndex(y) {
      const vh = window.innerHeight;
      if (y <= beatTops[0]) return 0;
      for (let k = 0; k < beatTops.length - 1; k++) {
        const departAt = beatTops[k] + vh * 0.55;
        const arriveAt = beatTops[k + 1];
        if (y < departAt) return stopTileIndex[k];
        if (y < arriveAt) {
          const f = (y - departAt) / (arriveAt - departAt);
          return stopTileIndex[k] + (stopTileIndex[k + 1] - stopTileIndex[k]) * f;
        }
      }
      return stopTileIndex[stopTileIndex.length - 1];
    }

    // ---- Overlays ----
    const cardBand = document.getElementById('card-band');
    const cardIcon = document.getElementById('card-icon');
    const cardCity = document.getElementById('card-city');
    const cardLine = document.getElementById('card-line');
    let shownCard = -1;

    function updateOverlays(y, currentIndex) {
      const vh = window.innerHeight;
      titleOverlay.classList.toggle('hidden', y > vh * 0.3);

      let active = -1;
      for (let k = 1; k < beatTops.length; k++) {
        if (Math.abs(y - beatTops[k]) < vh * 0.3 && Math.abs(currentIndex - stopTileIndex[k]) < 0.6) {
          active = k;
          break;
        }
      }

      const outroIdx = STOPS.length - 1;
      outroOverlay.classList.toggle('visible', active === outroIdx);

      const cardActive = active > 0 && active < outroIdx;
      cardOverlay.classList.toggle('visible', cardActive);
      if (cardActive && shownCard !== active) {
        shownCard = active;
        const stop = STOPS[active];
        cardBand.style.backgroundColor = stop.accent;
        cardBand.style.color = stop.accentText;
        cardIcon.textContent = stop.icon;
        cardCity.textContent = stop.label;
        cardLine.textContent = stop.line;
      }
      if (!cardActive) shownCard = -1;
      return active;
    }

    // ---- Animation loop. All DOM writes are gated on value change so a
    // parked pawn costs nothing per frame. ----
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const CAM_OVERRIDE = new URLSearchParams(location.search).get('cam');
    const lerpFactor = prefersReducedMotion ? 1.0 : 0.08;
    const camLerp = (prefersReducedMotion || CAM_OVERRIDE) ? 1.0 : 0.055;

    let targetIndex = 0;
    let currentIndex = 0;
    let lastX = 110, lastFlipX = 1;
    const cam = { x: 500, y: 500, k: 1.0, ax: 500, ay: 500 };
    const lastWrite = { token: '', shadow: '', trail: '', cam: '', activeTile: -2 };

    window.addEventListener('scroll', () => {
      targetIndex = scrollToTileIndex(window.scrollY);
    }, { passive: true });

    function tick(now) {
      currentIndex += (targetIndex - currentIndex) * lerpFactor;
      if (Math.abs(targetIndex - currentIndex) < 0.0005) currentIndex = targetIndex;

      const indexFloor = Math.floor(currentIndex);
      const indexCeil = Math.min(totalTiles - 1, indexFloor + 1);
      const f = currentIndex - indexFloor;

      let t_eased = 0;
      if (f > 0.15 && f < 0.85) {
        const t = (f - 0.15) / 0.7;
        t_eased = t * t * (3 - 2 * t);
      } else if (f >= 0.85) {
        t_eased = 1.0;
      }

      const distFloor = tileDistances[indexFloor];
      const distCeil = tileDistances[indexCeil];
      const pawnDistance = distFloor + (distCeil - distFloor) * t_eased;
      const point = boardPath.getPointAtLength(pawnDistance);

      const jumpY = -66 * 4 * t_eased * (1 - t_eased);
      const midAir = Math.sin(t_eased * Math.PI);
      let stretchY = 1.0 + 0.20 * midAir;
      const squashX = 1.0 - 0.08 * midAir;

      // Idle breathing while parked
      if (midAir < 0.01 && Math.abs(targetIndex - currentIndex) < 0.01) {
        stretchY += 0.018 * Math.sin(now / 320);
      }

      let flipX = lastFlipX;
      const deltaX = point.x - lastX;
      if (Math.abs(deltaX) > 0.3) flipX = deltaX > 0 ? 1 : -1;
      lastX = point.x; lastFlipX = flipX;

      const tokenT = `translate(${point.x.toFixed(1)}, ${(point.y + jumpY).toFixed(1)}) scale(${(flipX * squashX).toFixed(3)}, ${stretchY.toFixed(3)})`;
      if (tokenT !== lastWrite.token) {
        tokenInstance.setAttribute('transform', tokenT);
        lastWrite.token = tokenT;
      }

      // Grounded shadow shrinks while the pawn is airborne — this is what
      // sells the hop as physical
      const air = Math.min(1, -jumpY / 66);
      const shadowKey = `${point.x.toFixed(1)},${point.y.toFixed(1)},${air.toFixed(2)}`;
      if (shadowKey !== lastWrite.shadow) {
        pawnShadow.setAttribute('cx', point.x.toFixed(1));
        pawnShadow.setAttribute('cy', (point.y + 6).toFixed(1));
        pawnShadow.setAttribute('rx', (20 * (1 - 0.4 * air)).toFixed(1));
        pawnShadow.setAttribute('ry', (7 * (1 - 0.4 * air)).toFixed(1));
        pawnShadow.setAttribute('opacity', (0.5 * (1 - 0.55 * air)).toFixed(2));
        lastWrite.shadow = shadowKey;
      }

      const trailOffset = Math.max(0, pathLength - pawnDistance).toFixed(1);
      if (trailOffset !== lastWrite.trail) {
        trailCasing.setAttribute('stroke-dashoffset', trailOffset);
        trailCore.setAttribute('stroke-dashoffset', trailOffset);
        lastWrite.trail = trailOffset;
      }

      const active = updateOverlays(window.scrollY, currentIndex);

      const isOutro = active === STOPS.length - 1;
      let tgt = isOutro
        ? { x: 500, y: 500, k: 1.02, ax: 500, ay: 500 }
        : { x: point.x, y: point.y, k: 2.15, ax: 500, ay: 640 };
      // Debug override: ?cam=wide or ?cam=<zoom factor>
      if (CAM_OVERRIDE === 'wide') tgt = { x: 500, y: 500, k: 1.0, ax: 500, ay: 500 };
      else if (CAM_OVERRIDE) tgt = { x: point.x, y: point.y, k: parseFloat(CAM_OVERRIDE) || 2.15, ax: 500, ay: 560 };
      cam.x += (tgt.x - cam.x) * camLerp;
      cam.y += (tgt.y - cam.y) * camLerp;
      cam.k += (tgt.k - cam.k) * camLerp;
      cam.ax += (tgt.ax - cam.ax) * camLerp;
      cam.ay += (tgt.ay - cam.ay) * camLerp;
      const camT = `translate(${cam.ax.toFixed(1)}, ${cam.ay.toFixed(1)}) scale(${cam.k.toFixed(3)}) translate(${(-cam.x).toFixed(1)}, ${(-cam.y).toFixed(1)})`;
      if (camT !== lastWrite.cam) {
        camera.setAttribute('transform', camT);
        lastWrite.cam = camT;
      }

      const rounded = Math.round(currentIndex);
      if (rounded !== lastWrite.activeTile) {
        tilesGroup.querySelectorAll('.interactive-tile-group').forEach((tg, idx) => {
          tg.classList.toggle('active', stopTileIndex[idx] === rounded);
        });
        lastWrite.activeTile = rounded;
      }

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
</script>
