<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Look closer</title>
<meta name="description" content="Everywhere Dragon Chan has touched down, mapped out like a board game.">

<link rel="canonical" href="https://iamdragonc.com/battle-scars/">
<meta property="og:title" content="Dragon Chan — Battle Scars">
<meta property="og:description" content="Everywhere I've been, mapped out like a board game.">
<meta property="og:url" content="https://iamdragonc.com/battle-scars/">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Mulish:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --font-display: 'Montserrat', 'Gotham', system-ui, sans-serif;
    --font-body:    'Mulish', 'Avenir', system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, monospace;
    --blurple:      #3066BE;
    --crimson:      #D7263D;
    --moss:         #6E9075;
    --wisteria:     #CCC9DC;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #000;
    color: #fff;
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .scars-bg {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(50% 45% at 8% 4%, rgba(48,102,190,0.28), transparent 70%),
      radial-gradient(140% 120% at 20% -6%, #0d1050 0%, #04051c 45%, #000 100%);
  }
  .scars-wrap {
    position: relative;
    z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: clamp(64px, 12vh, 120px) 24px clamp(72px, 10vh, 120px);
  }

  .scars-eyebrow {
    display: inline-block;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(13px, 2.4vw, 16px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--blurple);
    margin: 0;
    transform: rotate(-2deg);
  }
  .scars-h1 {
    font-family: var(--font-display);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    line-height: 0.98;
    color: #fff;
    font-size: clamp(32px, 7vw, 64px);
    margin: 16px 0 0;
  }
  .scars-h1 .accent { color: var(--crimson); }
  .scars-lede {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: clamp(16px, 2.2vw, 19px);
    line-height: 1.6;
    color: rgba(255,255,255,0.68);
    max-width: 58ch;
    margin: 22px 0 0;
  }

  /* ---- Board ---- */
  .board-wrap {
    margin: clamp(40px, 6vh, 64px) 0 0;
    border: 2px dashed rgba(255,255,255,0.18);
    border-radius: 24px;
    padding: clamp(16px, 3vw, 32px);
    background: rgba(255,255,255,0.02);
  }
  .board-svg { width: 100%; height: auto; display: block; overflow: visible; }
  .board-path {
    fill: none;
    stroke: rgba(255,255,255,0.24);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 2 16;
  }
  .board-stop circle.tile {
    stroke: rgba(0,0,0,0.5);
    stroke-width: 3;
    transition: transform 200ms ease;
    transform-box: fill-box;
    transform-origin: center;
  }
  .board-stop:hover circle.tile { transform: scale(1.14); }
  .board-stop text {
    font-family: var(--font-display);
    font-weight: 800;
    fill: #fff;
    text-anchor: middle;
  }
  .board-stop .stop-num {
    font-family: var(--font-mono);
    font-size: 12px;
    text-anchor: middle;
    dominant-baseline: middle;
    font-weight: 700;
  }
  .board-token { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6)); }

  .scars-note {
    font-family: var(--font-mono);
    font-size: 12px;
    color: rgba(255,255,255,0.34);
    margin: 18px 0 0;
  }

  .scars-foot {
    margin: clamp(48px, 8vh, 80px) 0 0;
    display: flex;
    flex-wrap: wrap;
    gap: 14px 28px;
    align-items: center;
  }
  .scars-link {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 15px;
    color: rgba(255,255,255,0.72);
    text-decoration: none;
    border-bottom: 2px solid rgba(255,255,255,0.28);
    padding-bottom: 2px;
    transition: color 160ms ease, border-color 160ms ease;
  }
  .scars-link:hover { color: var(--blurple); border-color: var(--blurple); }

  @media (prefers-reduced-motion: reduce) {
    .board-stop circle.tile { transition: none; }
  }
</style>
</head>
<body>

<main class="scars-bg">
  <div class="scars-wrap">
    <p class="scars-eyebrow">Where I've Been</p>
    <h1 class="scars-h1">BATTLE <span class="accent">SCARS.</span></h1>
    <p class="scars-lede">Every stop leaves a mark. Here's the board so far &mdash; hover a space for the story. (Stories land soon; this run is placeholder data.)</p>

    <div class="board-wrap">
      <svg class="board-svg" viewBox="0 0 800 420" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Game-board style map of cities visited, in order: San Diego, Philadelphia, New York, Houston, Seattle, St. Louis, Chicago, and Philadelphia again.">
        <path class="board-path" d="M90,100 Q195.0,127.2 290,75 Q395.2,62.9 490,110 Q599.7,137.2 700,85 Q640.0,207.5 700,330 Q599.7,277.8 490,305 Q394.5,349.7 290,335 Q195.0,282.8 90,310" />

        <g class="board-stop">
          <circle class="tile" cx="90" cy="100" r="20" fill="#3066BE" />
          <text class="stop-num" x="90" y="100" fill="#fff">1</text>
          <text x="90" y="74" font-size="15">San Diego</text>
        </g>
        <g class="board-stop">
          <circle class="tile" cx="290" cy="75" r="20" fill="#D7263D" />
          <text class="stop-num" x="290" y="75" fill="#fff">2</text>
          <text x="290" y="49" font-size="15">Philly</text>
        </g>
        <g class="board-stop">
          <circle class="tile" cx="490" cy="110" r="20" fill="#6E9075" />
          <text class="stop-num" x="490" y="110" fill="#fff">3</text>
          <text x="490" y="84" font-size="15">New York</text>
        </g>
        <g class="board-stop">
          <circle class="tile" cx="700" cy="85" r="20" fill="#CCC9DC" />
          <text class="stop-num" x="700" y="85" fill="#000">4</text>
          <text x="700" y="59" font-size="15">Houston</text>
        </g>
        <g class="board-stop">
          <circle class="tile" cx="700" cy="330" r="20" fill="#3066BE" />
          <text class="stop-num" x="700" y="330" fill="#fff">5</text>
          <text x="700" y="364" font-size="15">Seattle</text>
        </g>
        <g class="board-stop">
          <circle class="tile" cx="490" cy="305" r="20" fill="#D7263D" />
          <text class="stop-num" x="490" y="305" fill="#fff">6</text>
          <text x="490" y="339" font-size="15">St Louis</text>
        </g>
        <g class="board-stop">
          <circle class="tile" cx="290" cy="335" r="20" fill="#6E9075" />
          <text class="stop-num" x="290" y="335" fill="#fff">7</text>
          <text x="290" y="369" font-size="15">Chicago</text>
        </g>
        <g class="board-stop">
          <circle class="tile" cx="90" cy="310" r="20" fill="#CCC9DC" />
          <text class="stop-num" x="90" y="310" fill="#000">8</text>
          <text x="90" y="344" font-size="15">Philly (again)</text>
        </g>

        <g class="board-token" transform="translate(90,310)">
          <text x="0" y="-28" font-size="24" text-anchor="middle">&#128009;</text>
        </g>
      </svg>
    </div>
    <p class="scars-note">Current run: San Diego &rarr; Philly &rarr; New York &rarr; Houston &rarr; Seattle &rarr; St. Louis &rarr; Chicago &rarr; Philly (again).</p>

    <div class="scars-foot">
      <a class="scars-link" href="/">Back home</a>
      <a class="scars-link" href="/now/">What I'm doing now</a>
    </div>
  </div>
</main>

</body>
</html>
